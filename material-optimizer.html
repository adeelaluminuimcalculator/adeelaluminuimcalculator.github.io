<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Optimizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:#e0e0e0;font-family:sans-serif;padding:12px}
.shop{text-align:center;background:#1a1a1a;border:1px solid #c9a84c;border-radius:10px;padding:12px;margin-bottom:12px}
.shop h2{color:#c9a84c;font-size:1.2rem}
.shop p{color:#888;font-size:0.85rem;margin-top:3px}
.title-box{text-align:center;background:#1a1a1a;border:2px solid #c9a84c;border-radius:10px;padding:10px;margin-bottom:12px}
.title-box span{color:#c9a84c;font-size:1.2rem;font-weight:bold}
.card{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:14px;margin-bottom:10px}
.card h3{color:#c9a84c;font-size:1rem;font-weight:bold;margin-bottom:10px;text-transform:uppercase}
.row{display:flex;gap:10px;margin-bottom:10px}
.grp{flex:1}
label{display:block;font-size:0.72rem;color:#888;margin-bottom:4px;text-transform:uppercase}
input,select,textarea{width:100%;background:#252525;border:1px solid #333;border-radius:6px;padding:9px 10px;color:#e0e0e0;font-size:1rem;outline:none;-webkit-appearance:none}
textarea{height:140px;font-size:1.2rem;font-weight:bold;color:#7dff7d;font-family:monospace;resize:none}
input:focus,select:focus,textarea:focus{border-color:#c9a84c}
.btn{width:100%;background:#c9a84c;color:#0f0f0f;border:none;padding:13px;border-radius:8px;font-size:1.1rem;font-weight:bold;cursor:pointer;margin-top:6px}
.btn2{width:100%;background:#1a3a1a;color:#7dff7d;border:1px solid #7dff7d;padding:12px;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer;margin-top:8px;display:none}
.res{display:none;margin-top:10px}
.bd{background:#252525;border-radius:8px;padding:10px;margin-bottom:8px}
.bd h4{color:#e8c96a;font-size:0.85rem;font-weight:bold;margin-bottom:7px;text-transform:uppercase}
.br{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #333;font-size:0.82rem}
.br:last-child{border:none}
.bn{color:#888}
.bv{color:#e0e0e0;font-weight:bold}
.bvg{color:#7dff7d;font-weight:bold}
.bvy{color:#f59e0b;font-weight:bold}
.bvb{color:#7db8ff;font-weight:bold}
.sec-hd{background:#1e1a0f;border:1px solid #c9a84c;border-radius:8px;padding:8px 12px;margin-bottom:6px;color:#c9a84c;font-weight:bold;font-size:0.9rem;display:flex;justify-content:space-between}
.bar-box{background:#0f0f0f;border:1px solid #333;border-radius:8px;padding:10px;margin-bottom:6px}
.bar-track{height:24px;background:#333;border-radius:4px;display:flex;overflow:hidden;margin:6px 0}
.cut-seg{height:100%;background:linear-gradient(to bottom,#0284c7,#0369a1);border-right:1px solid #0f0f0f;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:white;min-width:2px}
.waste-seg{height:100%;background:linear-gradient(to bottom,#78350f,#451a03);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#f59e0b}
.cuts-log{font-size:11px;color:#888;font-family:monospace;background:rgba(0,0,0,0.3);padding:4px 8px;border-radius:4px}
.market-box{background:#1a1a0a;border:1px solid #f59e0b;border-radius:8px;padding:10px;margin-bottom:6px}
.tr{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;margin-top:5px;font-size:1rem;font-weight:bold}
.footer{text-align:center;background:#1a1a1a;border:1px solid #c9a84c;border-radius:10px;padding:10px;margin-top:10px}
.footer h3{color:#c9a84c;font-size:1rem}
.footer p{color:#888;font-size:0.82rem;margin-top:2px}
.hint{background:#252525;border-radius:6px;padding:7px 10px;margin-bottom:8px;font-size:0.78rem;color:#888}
.bill-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.97);z-index:9999;overflow-y:auto;padding:16px}
.bill-inner{background:#1a1a1a;border:1px solid #c9a84c;border-radius:12px;padding:18px;max-width:500px;margin:0 auto}
.bill-inner h2{color:#c9a84c;font-size:1.2rem;font-weight:bold;margin-bottom:14px;border-bottom:1px solid #333;padding-bottom:8px}
.close-btn{background:#5a1a1a;color:#ff6b6b;border:none;border-radius:6px;padding:8px 16px;font-weight:bold;cursor:pointer;margin-bottom:14px;width:100%}
</style>
</head>
<body>

<div class="shop">
  <h2>🏪 ADEEL WELDING & ALUMINIUM HOUSE</h2>
  <p>📞 0321-7378024</p>
</div>

<div class="title-box">
  <span>📦 MATERIAL OPTIMIZER</span>
</div>

<div class="card">
  <h3>⚙️ Settings</h3>
  <div class="row">
    <div class="grp"><label>Gauge</label>
      <select id="gauge">
        <option value="1.2">1.2mm</option>
        <option value="1.6">1.6mm</option>
        <option value="2.0">2.0mm</option>
      </select>
    </div>
    <div class="grp"><label>Discount %</label>
      <input id="disc" type="number" value="0" min="0" max="99">
    </div>
  </div>
  <div class="hint">💡 Size likho — Width x Height — ek line mein ek size</div>
  <label>Frame Sizes (W x H)</label>
  <textarea id="sizes" placeholder="48x48&#10;60x72&#10;72x60"></textarea>
  <button class="btn" onclick="runOptimizer()">OPTIMIZE KAREIN ▶</button>
</div>

<div class="res" id="res">
  <div id="shop-list"></div>
  <div id="cutting-plan"></div>
  <button class="btn2" id="bill-btn" onclick="showBill()">📋 CUSTOMER BILL DEKHEIN</button>
  <div class="footer"><h3>🏪 ADEEL WELDING & ALUMINIUM HOUSE</h3><p>📞 0321-7378024</p></div>
</div>

<div class="bill-overlay" id="bill-overlay">
  <div class="bill-inner">
    <button class="close-btn" onclick="hideBill()">✕ WAPAS JAEIN</button>
    <h2>📋 CUSTOMER BILL</h2>
    <div id="bill-content"></div>
  </div>
</div>

<script>
var RATES={'DC26F':{'1.2':880,'1.6':1049,'2.0':1244},'DC30F':{'1.2':754,'1.6':911,'2.0':1067},'M23':{'1.2':354,'1.6':445,'2.0':542},'M28':{'1.2':431,'1.6':534,'2.0':645},'M24':{'1.2':420,'1.6':497,'2.0':605},'D29':{'1.2':274,'1.6':274,'2.0':274}};
var STOCKS={'DC26F':[15,17,19],'DC30F':[15,17,19],'M23':[14,16,18,20],'M28':[14,16,18,20],'M24':[14,16,18,20],'D29':[14,16,18,20]};
var invoiceData={};

function optimize(pieces,stocks){
  var remaining=[...pieces].sort((a,b)=>b-a);
  var fullBars=[],marketCuts=[];
  while(remaining.length>0){
    var best=null,bestIdx=[];
    stocks.forEach(function(ft){
      var space=ft*12,cuts=[],idx=[];
      for(var i=0;i<remaining.length;i++){
        if(remaining[i]<=space){space-=remaining[i];cuts.push(remaining[i]);idx.push(i);}
      }
      if(cuts.length>0&&(best===null||space<best.waste)){best={ft:ft,waste:space,cuts:cuts};bestIdx=idx;}
    });
    if(best){
      if(best.waste/(best.ft*12)>0.20){
        best.cuts.forEach(function(c){marketCuts.push(c);});
      } else {
        fullBars.push(best);
      }
      bestIdx.sort((a,b)=>b-a).forEach(function(i){remaining.splice(i,1);});
    } else {
      marketCuts.push(remaining[0]);
      remaining.splice(0,1);
    }
  }
  return{fullBars:fullBars,marketCuts:marketCuts};
}

function runOptimizer(){
  var text=document.getElementById('sizes').value.trim();
  if(!text){alert('Size daalen!');return;}
  var lines=text.split('\n');
  var demand={'DC26F':[],'DC30F':[],'M23':[],'M28':[],'M24':[],'D29':[]};
  var valid=0;
  lines.forEach(function(line){
    var m=line.match(/([\d.]+)\s*x\s*([\d.]+)/i);
    if(!m)return;
    var w=parseFloat(m[1]),h=parseFloat(m[2]);
    if(!w||!h)return;
    valid++;
    demand['DC26F'].push(w+3);
    demand['DC30F'].push(w+3);demand['DC30F'].push(h+3);demand['DC30F'].push(h+3);
    demand['M23'].push(h-1);demand['M23'].push(h-1);
    demand['M28'].push(h-1);demand['M28'].push(h-1);
    var m24=(w-6)/2;
    for(var k=0;k<4;k++)demand['M24'].push(m24);
    demand['D29'].push(h-1);demand['D29'].push(h-1);
    // D29 width: compare full W vs W/2 x2
    var r1=optimize([w],STOCKS['D29']);
    var r2=optimize([w/2,w/2],STOCKS['D29']);
    var w1=r1.fullBars.reduce(function(a,b){return a+b.waste;},0)+r1.marketCuts.reduce(function(a,b){return a+b;},0);
    var w2=r2.fullBars.reduce(function(a,b){return a+b.waste;},0)+r2.marketCuts.reduce(function(a,b){return a+b;},0);
    if(w2<=w1){demand['D29'].push(w/2);demand['D29'].push(w/2);}
    else{demand['D29'].push(w);}
  });
  if(!valid){alert('Format galat hai! (W x H)');return;}

  var shopHTML='<div class="bd"><h4>🛒 SHOP LIST</h4>';
  var planHTML='';
  invoiceData={};

  Object.keys(demand).forEach(function(sec){
    if(!demand[sec].length)return;
    var result=optimize([...demand[sec]].sort((a,b)=>b-a),STOCKS[sec]);
    var totalFt=0;
    var barGroups={};
    result.fullBars.forEach(function(b){
      barGroups[b.ft]=(barGroups[b.ft]||0)+1;
      totalFt+=b.ft;
    });
    var marketTotal=0;
    result.marketCuts.forEach(function(c){marketTotal+=c;});
    if(marketTotal>0){
      var mFt=Math.ceil(marketTotal/12*4)/4;
      totalFt+=mFt;
    }
    invoiceData[sec]=totalFt;

    // Shop list row
    var fullBarsText=Object.keys(barGroups).map(function(ft){return ft+'ft × '+barGroups[ft];}).join(', ');
    var marketText=marketTotal>0?'Cut: '+marketTotal.toFixed(1)+'"':'—';
    shopHTML+='<div class="br"><span class="bn">'+sec+'</span><span class="bvg">'+fullBarsText+'</span><span class="bvy">'+marketText+'</span></div>';

    // Cutting plan
    planHTML+='<div class="sec-hd"><span>⚙️ '+sec+'</span><span style="color:#888;font-size:0.8rem">'+totalFt.toFixed(2)+' ft</span></div>';
    result.fullBars.forEach(function(bar,i){
      var total=bar.ft*12;
      var trackHTML='';
      bar.cuts.forEach(function(c){
        trackHTML+='<div class="cut-seg" style="width:'+((c/total)*100)+'%">'+c.toFixed(1)+'"</div>';
      });
      if(bar.waste>0)trackHTML+='<div class="waste-seg" style="width:'+((bar.waste/total)*100)+'%">'+bar.waste.toFixed(1)+'"</div>';
      planHTML+='<div class="bar-box">'+
        '<div style="display:flex;justify-content:space-between;font-size:0.78rem;color:#888;margin-bottom:4px"><span>Rod '+(i+1)+' ('+bar.ft+'ft)</span><span style="color:#f59e0b">Waste: '+bar.waste.toFixed(1)+'"</span></div>'+
        '<div class="bar-track">'+trackHTML+'</div>'+
        '<div class="cuts-log">['+bar.cuts.map(function(v){return v.toFixed(1)+'"';}).join(' + ')+']</div>'+
        '</div>';
    });
    if(result.marketCuts.length>0){
      planHTML+='<div class="market-box"><div style="color:#f59e0b;font-size:0.78rem;font-weight:bold;margin-bottom:4px">🛒 Market Cut Pieces</div>'+
        '<div class="cuts-log" style="color:#fde047">['+result.marketCuts.map(function(v){return v.toFixed(1)+'"';}).join(' + ')+']</div></div>';
    }
  });

  shopHTML+='</div>';
  document.getElementById('shop-list').innerHTML=shopHTML;
  document.getElementById('cutting-plan').innerHTML='<div class="card"><h3>✂️ CUTTING PLAN</h3>'+planHTML+'</div>';
  document.getElementById('bill-btn').style.display='block';
  document.getElementById('res').style.display='block';
}

function showBill(){
  var gauge=document.getElementById('gauge').value;
  var disc=parseFloat(document.getElementById('disc').value)||0;
  var html='<div class="bd"><h4>💰 Bill Details</h4>';
  var gross=0;
  Object.keys(invoiceData).forEach(function(sec){
    var ft=invoiceData[sec];
    var rate=RATES[sec][gauge];
    var amt=ft*rate;
    gross+=amt;
    html+='<div class="br"><span class="bn">'+sec+'</span><span class="bv">'+ft.toFixed(2)+'ft × '+rate+' = Rs.'+Math.round(amt)+'</span></div>';
  });
  var da=gross*disc/100;
  var net=gross-da;
  html+='</div>';
  html+='<div class="tr" style="background:#333;color:#ccc"><span>GROSS</span><span>Rs.'+Math.round(gross)+'</span></div>';
  html+='<div class="tr" style="background:#1e1a0f;color:#c9a84c"><span>DISCOUNT ('+disc+'%)</span><span>-Rs.'+Math.round(da)+'</span></div>';
  html+='<div class="tr" style="background:#c9a84c;color:#000;font-size:1.2rem"><span>NET PAYABLE</span><span>Rs.'+Math.round(net)+'</span></div>';
  document.getElementById('bill-content').innerHTML=html;
  document.getElementById('bill-overlay').style.display='block';
}

function hideBill(){
  document.getElementById('bill-overlay').style.display='none';
}

var C=0;
function chk(){try{if(localStorage.getItem('ok9')==='1')return true;var o=parseInt(localStorage.getItem('u9')||'0')+1;localStorage.setItem('u9',o);if(o<=2)return true;return false;}catch(e){C++;return C<=2;}}
function showLock(){var o=document.createElement('div');o.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:rgba(0,0,0,0.97);display:flex;align-items:center;justify-content:center;';o.innerHTML='<div style="background:#1a1a1a;border:2px solid #c9a84c;border-radius:12px;padding:24px;text-align:center;width:280px;"><p style="color:#c9a84c;font-size:1.1rem;font-weight:bold;margin-bottom:8px">🔒 PROTECTED</p><p style="color:#888;font-size:0.82rem;margin-bottom:12px">Adeel Welding ke liye hai</p><input id="pi" type="password" placeholder="Password daalen..." style="width:100%;padding:10px;border-radius:6px;border:1px solid #555;background:#252525;color:#fff;font-size:1rem;margin-bottom:10px;outline:none;"><br><button onclick="tryP()" style="width:100%;background:#c9a84c;border:none;padding:11px;border-radius:6px;font-size:1rem;cursor:pointer;font-weight:bold">🔑 OPEN</button><p id="pe" style="color:#ff6b6b;font-size:0.8rem;margin-top:8px;display:none">Galat password!</p></div>';document.body.appendChild(o);}
function tryP(){var p=document.getElementById('pi').value;if(p==='Hassanm8480317'){try{localStorage.setItem('ok9','1');}catch(e){}location.reload();}else{document.getElementById('pe').style.display='block';document.getElementById('pi').value='';}}
if(!chk())showLock();
</script>
</body>
</html>
