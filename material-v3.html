*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:#e0e0e0;font-family:sans-serif;padding:12px}

.btn-bill{width:100%;background:#1a3a1a;color:#7dff7d;border:1px solid #7dff7d;padding:12px;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer;margin-top:8px;display:none}

.plan-sec{margin-bottom:10px}
.plan-name{background:#1e1a0f;border:1px solid #c9a84c;border-radius:6px;padding:6px 10px;color:#c9a84c;font-weight:bold;font-size:0.85rem;margin-bottom:5px;display:flex;justify-content:space-between}

.bd{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:12px;margin-bottom:10px}

.shop-card{background:#0a0a0a;border:2px solid #c9a84c;border-radius:14px;padding:16px;min-height:100vh;display:flex;flex-direction:column}
.shop-header{text-align:center;border-bottom:2px dashed #c9a84c;padding-bottom:12px;margin-bottom:14px}

.shop-grid{flex:1;display:flex;flex-direction:column;justify-content:center;gap:0}
.shop-row{display:flex;align-items:center;border-bottom:1px solid #222;padding:8px 0}
.shop-row:last-child{border:none}
.shop-sec{color:#c9a84c;font-weight:900;text-align:left;flex:0 0 22%}
.shop-fracs{flex:1;display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-start;align-items:center}
.frac{display:flex;flex-direction:column;align-items:center;line-height:1}
.frac-top{color:#7dff7d;font-weight:800}
.frac-line{width:100%;height:2px;background:#7dff7d;margin:2px 0}
.frac-bot{color:#7dff7d;font-weight:700}

function showShop(){
  buildShopCard();
  document.getElementById('shop-overlay').style.display='block';
}
function hideShop(){document.getElementById('shop-overlay').style.display='none';}

function buildShopCard(){
  var secs=Object.keys(shopData);
  var totalFracs=0;
  secs.forEach(function(s){
    totalFracs+=Object.keys(shopData[s].rods).length;
    if(shopData[s].cutFt)totalFracs+=1;
  });

  var fontSize=1.6;
  if(totalFracs>20)fontSize=0.9;
  else if(totalFracs>15)fontSize=1.1;
  else if(totalFracs>10)fontSize=1.3;
  else if(totalFracs>6)fontSize=1.5;

  var html='<div class="shop-header">';
  html+='<div class="shop-name" style="font-size:'+(fontSize*0.85)+'rem">ADEEL WELDING & ALUMINIUM HOUSE</div>';
  html+='<div class="shop-sub" style="font-size:'+(fontSize*0.55)+'rem">MARKET MATERIAL LIST</div>';
  html+='<div class="shop-phone" style="padding:5px 16px;font-size:'+(fontSize*0.7)+'rem">📱 0321-7378024</div>';
  html+='</div>';

  html+='<div class="shop-grid">';
  secs.forEach(function(name){
    var d=shopData[name];
    html+='<div class="shop-row">';
    html+='<div class="shop-sec" style="font-size:'+fontSize+'rem">'+name+'</div>';
    html+='<div class="shop-fracs">';
    Object.keys(d.rods).sort(function(a,b){return a-b;}).forEach(function(ft){
      html+='<div class="frac"><span class="frac-top" style="font-size:'+fontSize+'rem">'+ft+'</span><span class="frac-line"></span><span class="frac-bot" style="font-size:'+(fontSize*0.85)+'rem">'+d.rods[ft]+'</span></div>';
    });
    if(d.cutFt){
      html+='<div class="shop-cut" style="font-size:'+(fontSize*0.85)+'rem">✂️ '+d.cutFt+'ft</div>';
    }
    html+='</div></div>';
  });
  html+='</div>';

  document.getElementById('shop-card').innerHTML=html;
}

function showBill(){document.getElementById('bill-overlay').style.display='block';calcBill();}
function hideBill(){document.getElementById('bill-overlay').style.display='none';}

function calcBill(){
  var gauge=document.getElementById('bill-gauge').value;
  var disc=parseFloat(document.getElementById('bill-disc').value)||0;
  var html='<div class="bd"><div class="bd-title">💰 Bill Details</div>';
  var gross=0;
  var secs=Object.keys(invoiceData);
  for(var i=0;i<secs.length;i++){
    var sec=secs[i];
    var ft=invoiceData[sec];
    var rate=RATES[sec][gauge];
    var amt=ft*rate;
    gross+=amt;
    html+='<div class="br"><span class="bn">'+sec+' ('+ft+'ft × '+rate+')</span><span class="bv">Rs.'+Math.round(amt)+'</span></div>';
  }
  html+='</div>';
  var da=gross*disc/100,net=gross-da;
  html+='<div class="tr" style="background:#333;color:#ccc"><span>GROSS TOTAL</span><span>Rs.'+Math.round(gross)+'</span></div>';
  html+='<div class="tr" style="background:#1e1a0f;color:#c9a84c"><span>DISCOUNT ('+disc+'%)</span><span>- Rs.'+Math.round(da)+'</span></div>';
  html+='<div class="tr" style="background:#c9a84c;color:#000;font-size:1.2rem"><span>NET PAYABLE</span><span>Rs.'+Math.round(net)+'</span></div>';
  document.getElementById('bill-content').innerHTML=html;
}
