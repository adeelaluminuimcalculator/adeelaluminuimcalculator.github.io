<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adeel Aluminium Workshop Engine - Perfect Stock Locked</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --surface-bg: #0b0f19;
            --card-inner: #131a26;
            --gold-wire: #d4af37;
            --gold-dim: #aa8c2c;
            --text-pure: #ffffff;
            --text-low: #8a99ad;
            --neon-blue: #38bdf8;
            --neon-green: #34d399;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--surface-bg);
            color: var(--text-pure);
            padding: 20px 10px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 700px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 15px;
            border: 1px solid var(--gold-wire);
            background: var(--card-inner);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 20px;
            color: var(--gold-wire);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header p {
            font-size: 13px;
            color: var(--text-low);
            margin-top: 3px;
        }

        .tab-system {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: var(--card-inner);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-low);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }

        .tab-btn.active {
            border: 1px solid var(--gold-wire);
            color: var(--gold-wire);
            background: rgba(212, 175, 55, 0.05);
        }

        .panel {
            background: var(--card-inner);
            border: 1px solid var(--gold-wire);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .panel-title {
            font-size: 15px;
            color: var(--gold-wire);
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-stack {
            margin-bottom: 15px;
        }

        .input-stack label {
            display: block;
            font-size: 11px;
            color: var(--text-low);
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
        }

        select, input, textarea {
            width: 100%;
            background: #070a10;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 12px;
            color: #fff;
            font-size: 15px;
        }

        textarea {
            height: 140px;
            font-family: monospace;
            font-size: 20px;
            color: var(--neon-green);
            resize: none;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        textarea:focus {
            outline: none;
            border-color: var(--gold-wire);
        }

        .action-btn {
            background: transparent;
            color: var(--gold-wire);
            border: 1px solid var(--gold-wire);
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--gold-wire);
            color: var(--surface-bg);
        }

        .output-card {
            background: #111622;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--neon-blue);
        }

        .output-card-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .bar-strip {
            height: 28px;
            background: #1d2433;
            border-radius: 4px;
            display: flex;
            overflow: hidden;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .segment {
            background: #0284c7;
            border-right: 1px solid var(--surface-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
        }

        .segment.waste {
            background: repeating-linear-gradient(45deg, #2d1f10, #2d1f10 5px, #443019 5px, #443019 10px);
            color: var(--gold-wire);
        }

        .loose-box {
            background: #1a1610;
            border: 1px dashed var(--gold-wire);
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            color: #f59e0b;
            margin-top: 8px;
            font-family: monospace;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .summary-table th, .summary-table td {
            padding: 10px;
            text-align: left;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .summary-table th {
            color: var(--gold-wire);
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Adeel Welding & Aluminium House</h1>
        <p>Production Terminal & Optimization Engine</p>
    </header>

    <div class="tab-system">
        <div class="tab-btn active" id="threeTrackTab" onclick="switchModule('three-track')"><i class="fa-solid fa-layer-group"></i> Three Track</div>
        <div class="tab-btn" id="cuttingTab" onclick="switchModule('cutting')"><i class="fa-solid fa-scissors"></i> Cutting</div>
    </div>

    <div class="panel">
        <div class="panel-title" id="panelTitleText"><i class="fa-solid fa-calculator"></i> Size Daalen</div>
        
        <div class="input-stack" id="gaugeWrapper">
            <label>Profile Gauge / Motai</label>
            <select id="gaugeSelect">
                <option value="1.2">1.2 mm Standard Profile</option>
                <option value="1.6">1.6 mm Heavy Profile</option>
                <option value="2.0">2.0 mm Premium Profile</option>
            </select>
        </div>

        <div class="input-stack" id="discountWrapper">
            <label>Discount % (Optional)</label>
            <input type="number" id="discountInput" value="0" min="0">
        </div>

        <div class="input-stack">
            <label id="inputLabelText">Sizes Input (Width x Height)</label>
            <textarea id="sizesInput" placeholder="48?48&#10;60?72" onkeydown="handleQuestionMarkToX(event)"></textarea>
        </div>

        <button onclick="executeEngineCalculation()" class="action-btn">Calculate Optimization</button>
    </div>

    <div id="summarySchedulePanel" class="panel" style="display:none;">
        <div class="panel-title"><i class="fa-solid fa-clipboard-list"></i> Market Order List</div>
        <table class="summary-table">
            <thead>
                <tr>
                    <th>Profile Component</th>
                    <th>Full Pipe Requirements</th>
                    <th>Loose Tote Cut (Ft)</th>
                </tr>
            </thead>
            <tbody id="summaryTableRows"></tbody>
        </table>
    </div>

    <div id="blueprintsEngineArea" style="display:none;"></div>
</div>

<script>
    let activeModule = 'three-track';

    // CORRECTED FIXED STOCKS: Removed 13ft from M23, M28, M24, D29 completely!
    const STOCKS = {
        'DC26F': [15, 17, 19], 
        'DC30F': [15, 17, 19],
        'M23':   [14, 16, 18, 20], 
        'M28':   [14, 16, 18, 20],
        'M24':   [14, 16, 18, 20], 
        'D29':   [14, 16, 18, 20]
    };

    function switchModule(mod) {
        activeModule = mod;
        document.getElementById('threeTrackTab').classList.toggle('active', mod === 'three-track');
        document.getElementById('cuttingTab').classList.toggle('active', mod === 'cutting');
        
        if (mod === 'three-track') {
            document.getElementById('panelTitleText').innerHTML = `<i class="fa-solid fa-calculator"></i> Size Daalen`;
            document.getElementById('inputLabelText').innerText = "Sizes Input (Width x Height)";
            document.getElementById('gaugeWrapper').style.display = 'block';
            document.getElementById('discountWrapper').style.display = 'block';
        } else {
            document.getElementById('panelTitleText').innerHTML = `<i class="fa-solid fa-scissors"></i> Straight Cutting Cuts`;
            document.getElementById('inputLabelText').innerText = "Cuts Input (Likhien ek line me ek cut inch me, e.g. 63)";
            document.getElementById('gaugeWrapper').style.display = 'none';
            document.getElementById('discountWrapper').style.display = 'none';
        }
        
        document.getElementById('summarySchedulePanel').style.display = 'none';
        document.getElementById('blueprintsEngineArea').style.display = 'none';
    }

    function handleQuestionMarkToX(e) {
        const input = e.target;
        if (e.key === "?") {
            e.preventDefault();
            const start = input.selectionStart;
            input.value = input.value.substring(0, start) + " x " + input.value.substring(input.selectionEnd);
            input.selectionStart = input.selectionEnd = start + 3;
        }
    }

    function executeEngineCalculation() {
        const rawText = document.getElementById('sizesInput').value.trim();
        if(!rawText) return alert("Ustad ji, empty data process nahi ho sakta!");

        document.getElementById('summarySchedulePanel').style.display = 'block';
        document.getElementById('blueprintsEngineArea').style.display = 'block';

        if (activeModule === 'cutting') {
            runStraightCuttingModule(rawText);
        } else {
            runThreeTrackModule(rawText);
        }
    }

    function runStraightCuttingModule(text) {
        let cuts = text.split('\n').map(v => Math.ceil(parseFloat(v.trim()))).filter(v => !isNaN(v) && v > 0);
        if(cuts.length === 0) return alert("Valid cuts enter karein!");

        cuts.sort((a,b) => b-a);
        let genericStock = [14, 15, 16, 17, 18, 19, 20];
        let solution = solveCoreLinearEngine(cuts, genericStock, 'CUTTING');

        let barMap = {};
        solution.bars.forEach(b => barMap[b.lengthFt] = (barMap[b.lengthFt]||0) + 1);
        let fullText = Object.keys(barMap).map(ft => `${ft}ft (${barMap[ft]} Length)`).join(', ');

        let looseHTML = '--';
        if(solution.loose.length > 0) {
            let totalInches = solution.loose.reduce((s,c)=>s+c, 0);
            looseHTML = `${totalInches.toFixed(1)}" (${Math.ceil(totalInches/12)} Ft)`;
        }

        document.getElementById('summaryTableRows').innerHTML = `<tr>
            <td><strong>Custom Cutting Component</strong></td>
            <td>${fullText || '--'}</td>
            <td>${looseHTML}</td>
        </tr>`;

        let mapHTML = `<div class="output-card">
            <div class="output-card-header"><span style="color:var(--gold-wire)">✂️ CUTTING MODULE STRIPS</span></div>`;
        solution.bars.forEach(b => {
            let segments = b.cuts.map(c => `<div class="segment" style="width:${(c/(b.lengthFt*12))*100}%">${c.toFixed(1)}"</div>`).join('');
            if(b.waste > 0) segments += `<div class="segment waste" style="width:${(b.waste/(b.lengthFt*12))*100}%">${b.waste.toFixed(1)}"</div>`;
            mapHTML += `<div class="bar-strip">${segments}</div>`;
        });
        if(solution.loose.length > 0) {
            mapHTML += `<div class="loose-box">Loose Pieces Stock Array: [${solution.loose.map(v=>v+'"').join(' + ')}]</div>`;
        }
        mapHTML += `</div>`;
        document.getElementById('blueprintsEngineArea').innerHTML = mapHTML;
    }

    function runThreeTrackModule(text) {
        const lines = text.split('\n');
        const store = { 'DC26F':[], 'DC30F':[], 'M23':[], 'M28':[], 'M24':[], 'D29':[] };

        lines.forEach(l => {
            const parts = l.toLowerCase().split('x');
            if(parts.length < 2) return;
            let w = parseFloat(parts[0]);
            let h = parseFloat(parts[1]);

            // YOUR EXACT FORMULA RULES FIXED
            store['DC26F'].push(w + 3); // Width + 3"
            
            store['DC30F'].push(w + 3); // 1 pc Width + 3"
            store['DC30F'].push(h + 3); // 2 pcs Height + 3"
            store['DC30F'].push(h + 3);

            let exactHeightCut = h - 1.5; // Height mines 1.5"
            store['M23'].push(exactHeightCut, exactHeightCut); // 2 pcs
            store['M28'].push(exactHeightCut, exactHeightCut); // 2 pcs
            
            let m24Cut = (w - 6) / 2; // (Width - 6") / 2
            store['M24'].push(m24Cut, m24Cut, m24Cut, m24Cut); // 4 pcs

            let d29WidthCut = w / 2; // Width taqseem 2
            store['D29'].push(exactHeightCut, exactHeightCut); // 2 pcs Height (mines 1.5")
            store['D29'].push(d29WidthCut, d29WidthCut); // 2 pcs Width (taqseem 2)
        });

        let tableRows = '', mapHTML = '';

        Object.keys(store).forEach(profile => {
            if(store[profile].length === 0) return;
            let res = solveCoreLinearEngine(store[profile].sort((a,b)=>b-a), STOCKS[profile], profile);

            let barMap = {};
            res.bars.forEach(b => barMap[b.lengthFt] = (barMap[b.lengthFt]||0)+1);
            let fullText = Object.keys(barMap).map(ft => `${ft}ft (${barMap[ft]} Length)`).join(', ');

            let looseHTML = '--';
            if(res.loose.length > 0) {
                let totalL = res.loose.reduce((s,c)=>s+c, 0);
                let feet = Math.ceil((totalL/12)*4)/4;
                looseHTML = `${totalL.toFixed(1)}" (${feet} Ft Cut)`;
            }

            tableRows += `<tr><td><strong>${profile}</strong></td><td>${fullText || '--'}</td><td>${looseHTML}</td></tr>`;

            mapHTML += `<div class="output-card">
                <div class="output-card-header">
                    <span style="color:var(--gold-wire)">⚙️ PROFILE Component: ${profile}</span>
                </div>`;
            res.bars.forEach(b => {
                let segments = b.cuts.map(c => `<div class="segment" style="width:${(c/(b.lengthFt*12))*100}%">${c.toFixed(1)}"</div>`).join('');
                if(b.waste > 0) segments += `<div class="segment waste" style="width:${(b.waste/(b.lengthFt*12))*100}%">${b.waste.toFixed(1)}"</div>`;
                mapHTML += `<div class="bar-strip">${segments}</div>`;
            });
            if(res.loose.length > 0) {
                mapHTML += `<div class="loose-box">Loose Track Cuts List (Tote): [${res.loose.map(v => v.toFixed(1) + '"').join(' + ')}]</div>`;
            }
            mapHTML += `</div>`;
        });

        document.getElementById('summaryTableRows').innerHTML = tableRows;
        document.getElementById('blueprintsEngineArea').innerHTML = mapHTML;
    }

    function solveCoreLinearEngine(pieces, stocks, profile) {
        let remaining = [...pieces], bars = [], loose = [];
        
        while(remaining.length > 0) {
            let best = null, bestIdxs = [];
            
            stocks.forEach(ft => {
                let stockIn = ft * 12, current = [], idxs = [], rem = stockIn;
                for(let i=0; i<remaining.length; i++) {
                    if(remaining[i] <= rem) { current.push(remaining[i]); rem -= remaining[i]; idxs.push(i); }
                }
                if(current.length > 0 && (!best || rem < best.waste)) {
                    best = { lengthFt: ft, waste: rem, cuts: current }; bestIdxs = idxs;
                }
            });

            if(best) {
                // SINGLE PIECE TOTE PROTECTION: Agar single piece bache aur waste zyada ho to full bar nahi seedha tote mein!
                if(best.cuts.length === 1 && best.waste > (best.lengthFt * 12 * 0.6)) {
                    best.cuts.forEach(c => loose.push(c));
                }
                // Loose piece logic for big waste cuts on active components
                else if(best.waste >= 12.0 && ['M23','M28','D29','M24'].includes(profile)) { 
                    best.cuts.forEach(c => loose.push(c)); 
                }
                else { 
                    bars.push(best); 
                }
                bestIdxs.sort((a,b)=>b-a).forEach(idx => remaining.splice(idx, 1));
            } else { 
                loose.push(remaining[0]); remaining.splice(0, 1); 
            }
        }
        return { bars, loose };
    }
</script>

</body>
</html>
