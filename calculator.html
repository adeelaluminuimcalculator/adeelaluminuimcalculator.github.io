<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Adeel Aluminium Optimizer</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:1200px;
margin:auto;
padding:20px;
}
textarea{
width:100%;
height:220px;
font-size:16px;
}
button{
padding:12px 20px;
font-size:18px;
cursor:pointer;
}
pre{
background:#f5f5f5;
padding:15px;
white-space:pre-wrap;
border-radius:8px;
}
</style>
</head>

<body>

<h2>Adeel Welding & Aluminium House</h2>
<p>03217378024</p>

<h3>Frame Sizes</h3>

<textarea id="sizes" placeholder="72x72
72x60
60x48"></textarea>

<br><br>

<button onclick="calculate()">
Calculate
</button>

<h3>Pieces List</h3>
<pre id="pieces"></pre>

<h3>Shop Totals</h3>
<pre id="totals"></pre>

<script>

function calculate(){

let input =
document.getElementById("sizes").value.trim();

if(input===""){
alert("Size dalo");
return;
}

let lines=input.split("\n");

let piecesOutput="";

let totalDC26=0;
let totalDC30=0;
let totalM23=0;
let totalM28=0;
let totalM24=0;
let totalD29=0;

for(let i=0;i<lines.length;i++){

let line=lines[i].trim();

let m=line.match(
/([\d.]+)\s*x\s*([\d.]+)/i
);

if(!m) continue;

let width=parseFloat(m[1]);
let height=parseFloat(m[2]);

let dc26=width+3;

let dc30Top=width+3;
let dc30Side=height+3;

let m23=height;
let m28=height;

let m24=(width-6)/2;

let d29Height=height;
let d29Width=width;

piecesOutput +=
"FRAME "+(i+1)+"\n";

piecesOutput +=
"SIZE = "+width+" x "+height+"\n\n";

piecesOutput +=
"DC26F\n"+
dc26.toFixed(1)+"\n\n";

piecesOutput +=
"DC30F\n"+
dc30Top.toFixed(1)+"\n"+
dc30Side.toFixed(1)+"\n"+
dc30Side.toFixed(1)+"\n\n";

piecesOutput +=
"M23\n"+
m23.toFixed(1)+"\n"+
m23.toFixed(1)+"\n\n";

piecesOutput +=
"M28\n"+
m28.toFixed(1)+"\n"+
m28.toFixed(1)+"\n\n";

piecesOutput +=
"M24\n"+
m24.toFixed(1)+"\n"+
m24.toFixed(1)+"\n"+
m24.toFixed(1)+"\n"+
m24.toFixed(1)+"\n\n";

piecesOutput +=
"D29\n"+
d29Height.toFixed(1)+"\n"+
d29Height.toFixed(1)+"\n"+
d29Width.toFixed(1)+"\n\n";

piecesOutput +=
"--------------------------\n\n";

totalDC26 += dc26;

totalDC30 +=
dc30Top +
dc30Side +
dc30Side;

totalM23 +=
m23*2;

totalM28 +=
m28*2;

totalM24 +=
m24*4;

totalD29 +=
(d29Height*2)+d29Width;

}

document.getElementById("pieces")
.textContent=piecesOutput;

document.getElementById("totals")
.textContent=

"DC26F Total = "+
totalDC26.toFixed(1)+'"'+"\n\n"+

"DC30F Total = "+
totalDC30.toFixed(1)+'"'+"\n\n"+

"M23 Total = "+
totalM23.toFixed(1)+'"'+"\n\n"+

"M28 Total = "+
totalM28.toFixed(1)+'"'+"\n\n"+

"M24 Total = "+
totalM24.toFixed(1)+'"'+"\n\n"+

"D29 Total = "+
totalD29.toFixed(1)+'"';

}

</script>

</body>
</html>
